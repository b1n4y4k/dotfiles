general {
    disable_loading_bar = false
    hide_cursor         = true
    grace               = 0
    no_fade_in          = false
}

background {
    monitor =
    path    = screenshot   # blurs your current screen
    blur_passes  = 3
    blur_size    = 7
    brightness   = 0.7
}

input-field {
    monitor    =
    size       = 250, 50
    position   = 0, -100
    halign     = center
    valign     = center

    outline_thickness  = 2
    dots_size          = 0.25
    dots_spacing       = 0.2
    dots_center        = true

    outer_color     = rgba(255, 255, 255, 0.1)
    inner_color     = rgba(0, 0, 0, 0.5)
    font_color      = rgba(255, 255, 255, 1.0)
    fade_on_empty   = true
    placeholder_text = <i>Password</i>
    hide_input      = false
    check_color     = rgba(100, 200, 100, 1.0)
    fail_color      = rgba(200, 50, 50, 1.0)
    fail_text       = <i>$FAIL <b>($ATTEMPTS)</b></i>
}

label {
    monitor  =
    text     = $TIME
    color    = rgba(255, 255, 255, 0.9)
    font_size   = 64
    font_family = JetBrains Mono Bold
    position    = 0, 150
    halign      = center
    valign      = center
}

label {
    monitor  =
    text     = $USER
    color    = rgba(255, 255, 255, 0.6)
    font_size   = 18
    font_family = JetBrains Mono
    position    = 0, -180
    halign      = center
    valign      = center
}
