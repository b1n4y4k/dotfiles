# ~/.config/hypr/hyprpaper.conf
#
# Minimal hyprpaper config. IPC is on by default, but we set it
# explicitly here so `hyprctl hyprpaper ...` commands (used by
# wallpaper-select.sh) are guaranteed to work.
#
# preload/wallpaper lines below set an initial wallpaper at hyprpaper
# startup so you're never staring at a blank "no target" screen before
# picking one via the rofi switcher. Replace the path with any image
# that actually exists in your wallpaper folder.

ipc = true

# preload = ~/Pictures/Wallpapers/your-default.jpg
# wallpaper = ,~/Pictures/Wallpapers/your-default.jpg
