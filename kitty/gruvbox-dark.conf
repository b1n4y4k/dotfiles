# ╔══════════════════════════════════════════════════╗
# ║         Gruvbox Dark — kitty color theme        ║
# ╚══════════════════════════════════════════════════╝
#
# Based on the original Gruvbox palette by morhetz.
# Hard contrast variant for legibility over a blurred bg.

# ── Core ────────────────────────────────────────────
foreground  #ebdbb2
background  #1d2021

# ── Selection ───────────────────────────────────────
# Muted Gruvbox gray-brown — readable without blasting gold at you
selection_foreground  #ebdbb2
selection_background  #504945

# ── Cursor ──────────────────────────────────────────
cursor            #ebdbb2
cursor_text_color #1d2021

# ── URL underline ───────────────────────────────────
url_color #83a598

# ── Window border (used when split) ─────────────────
active_border_color   #d79921
inactive_border_color #3c3836

# ── Black (bg shades) ───────────────────────────────
color0  #1d2021
color8  #928374

# ── Red ─────────────────────────────────────────────
color1  #cc241d
color9  #fb4934

# ── Green ───────────────────────────────────────────
color2  #98971a
color10 #b8bb26

# ── Yellow ──────────────────────────────────────────
color3  #d79921
color11 #fabd2f

# ── Blue ────────────────────────────────────────────
color4  #458588
color12 #83a598

# ── Magenta / Purple ────────────────────────────────
color5  #b16286
color13 #d3869b

# ── Cyan / Aqua ─────────────────────────────────────
color6  #689d6a
color14 #8ec07c

# ── White (fg shades) ───────────────────────────────
color7  #a89984
color15 #ebdbb2
