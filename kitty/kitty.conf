# ╔══════════════════════════════════════════════════╗
# ║           kitty.conf — Gruvbox Rice             ║
# ║        Hyprland + Iosevka Term Extended         ║
# ╚══════════════════════════════════════════════════╝

# ── Includes ────────────────────────────────────────
include gruvbox-dark.conf


# ── Font ────────────────────────────────────────────
# font_family        Iosevka Term 
# bold_font          Iosevka Term Bold
# italic_font        Iosevka Term Italic
# bold_italic_font   Iosevka Term Bold Italic

font_size          12.0
adjust_line_height 110%

# Ligatures (Iosevka supports them — disable if you prefer)
font_features Iosevka-Term-Extended +calt +liga

# Disable blinking cursor; feels cleaner on a rice
cursor_blink_interval 0
cursor_shape block


# ── Transparency (pairs with Hyprland blur) ─────────
# Keep opacity moderate so blur shader does the heavy lifting.
# In hyprland.conf set: blur { enabled = true; passes = 3 }
background_opacity 0.85

# Lets kitty signal to the compositor that the window is
# translucent so Hyprland applies its blur layer correctly.
background_blur    1


# ── Window / Padding ────────────────────────────────
window_padding_width        10 14
single_window_margin_width  -1

# No built-in title bar — Hyprland decorates the window
hide_window_decorations     yes
remember_window_size        yes
initial_window_width        100c
initial_window_height       30c


# ── Tab Bar ─────────────────────────────────────────
tab_bar_style               powerline
tab_powerline_style         slanted
tab_bar_min_tabs            2
tab_bar_margin_width        0
active_tab_font_style       bold
inactive_tab_font_style     normal

# Gruvbox-matched tab colours (overrides theme file for tabs)
active_tab_foreground       #1d2021
active_tab_background       #d79921
inactive_tab_foreground     #a89984
inactive_tab_background     #3c3836
tab_bar_background          #1d2021


# ── Scrollback ──────────────────────────────────────
scrollback_lines            10000
scrollback_pager            less --chop-long-lines --RAW-CONTROL-CHARS +INPUT_LINE_NUMBER


# ── URL handling ────────────────────────────────────
url_style               curly
url_color               #83a598
open_url_with           default
detect_urls             yes


# ── Performance ─────────────────────────────────────
# Wayland-native; no XWayland overhead
linux_display_server wayland
repaint_delay        8
input_delay          2
sync_to_monitor      yes


# ── Bell ────────────────────────────────────────────
enable_audio_bell   no
visual_bell_duration 0.0


# ── Key maps ────────────────────────────────────────
# Sane defaults; adjust to taste
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard
map ctrl+shift+t    new_tab_with_cwd
map ctrl+shift+w    close_tab
map ctrl+shift+l    next_tab
map ctrl+shift+h    previous_tab

map ctrl+shift+equal    change_font_size all +1.0
map ctrl+shift+minus    change_font_size all -1.0
map ctrl+shift+0        change_font_size all 0

# Open a new window splitting horizontally (feels natural with tiling WMs)
map ctrl+shift+enter    new_window_with_cwd


# ── Shell integration ────────────────────────────────
shell_integration   enabled


# BEGIN_KITTY_FONTS
font_family      family="JetBrainsMono Nerd Font Mono"
bold_font        auto
italic_font      auto
bold_italic_font auto
# END_KITTY_FONTS